<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JSON Item Order & Value Editor</title>
	<style>
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background-color: #f4f6f8;
			color: #333;
			margin: 0;
			padding: 20px;
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		h1 {
			margin-top: 0;
		}
		.container {
			width: 100%;
			max-width: 1200px;
			display: flex;
			flex-direction: column;
			gap: 20px;
		}
		.io-section {
			display: flex;
			gap: 20px;
			width: 100%;
		}
		.io-box {
			flex: 1;
			display: flex;
			flex-direction: column;
			gap: 10px;
			background: #fff;
			padding: 15px;
			border-radius: 8px;
			box-shadow: 0 2px 5px rgba(0,0,0,0.1);
		}
		textarea {
			width: 100%;
			height: 150px;
			font-family: monospace;
			padding: 10px;
			border: 1px solid #ccc;
			border-radius: 4px;
			resize: vertical;
			box-sizing: border-box;
		}
		.controls {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		button {
			padding: 8px 16px;
			background-color: #007bff;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-weight: bold;
			transition: background 0.2s;
		}
		button:hover {
			background-color: #0056b3;
		}
		button:disabled {
			background-color: #ccc;
			cursor: not-allowed;
		}
		.file-input-wrapper {
			display: flex;
			align-items: center;
			gap: 10px;
		}
		#statusMsg {
			font-size: 0.9rem;
			font-weight: bold;
			color: #d9534f;
		}
		#cardsContainer {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
			gap: 20px;
			margin-top: 20px;
		}
		.card {
			background: #fff;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.1);
			padding: 15px;
			display: flex;
			flex-direction: column;
			position: relative;
		}
		.card-header {
			display: flex;
			gap: 15px;
			margin-bottom: 15px;
		}
		.card-image {
			width: 80px;
			height: 80px;
			object-fit: cover;
			border-radius: 8px;
			background-color: #eee;
			border: 1px solid #ddd;
		}
		.card-title {
			font-size: 1.2rem;
			font-weight: bold;
			margin: 0 0 5px 0;
		}
		.card-category {
			font-size: 0.9rem;
			color: #666;
			margin: 0;
		}
		.card-body {
			font-size: 0.85rem;
			flex-grow: 1;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		.card-body-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
		}
		.card-body-row strong {
			color: #222;
		}
		.card-input {
			width: 100px;
			padding: 4px;
			border: 1px solid #ccc;
			border-radius: 4px;
			font-size: 0.85rem;
			text-align: right;
		}
		.card-input:focus {
			outline: none;
			border-color: #007bff;
			box-shadow: 0 0 0 2px rgba(0,123,255,.25);
		}
		.prompt-text {
			font-size: 0.75rem;
			color: #777;
			background: #f9f9f9;
			padding: 5px;
			border-radius: 4px;
			max-height: 60px;
			overflow-y: auto;
			margin-top: 5px;
		}
		.card-actions {
			display: flex;
			justify-content: space-between;
			margin-top: 15px;
			padding-top: 10px;
			border-top: 1px solid #eee;
		}
		.btn-move {
			background-color: #28a745;
			flex: 1;
			margin: 0 5px;
		}
		.btn-move:hover {
			background-color: #218838;
		}
	</style>
</head>
<body>

<div class="container">
	<h1>JSON Item Order & Value Editor</h1>
	
	<div class="io-section">
		<!-- Input Section -->
		<div class="io-box">
			<div style="display: flex; justify-content: space-between; align-items: center;">
				<h3 style="margin: 0;">1. Input JSON</h3>
				<span id="statusMsg">Loading data/items.json...</span>
			</div>
			<div class="file-input-wrapper">
				<input type="file" id="fileInput" accept=".json">
				<span>OR paste below:</span>
			</div>
			<textarea id="inputJson" placeholder="Paste your JSON here if auto-load fails..."></textarea>
			<div class="controls">
				<button onclick="loadJsonFromTextarea()">Load from Textbox</button>
			</div>
		</div>
		
		<!-- Output Section -->
		<div class="io-box">
			<h3 style="margin: 0;">2. Output JSON</h3>
			<p style="margin: 0; font-size: 0.9rem; color: #666;">Updates automatically as you edit.</p>
			<textarea id="outputJson" readonly></textarea>
			<div class="controls">
				<button onclick="copyOutput()">Copy to Clipboard</button>
				<span id="copyMsg" style="color: green; display: none;">Copied!</span>
			</div>
		</div>
	</div>
	
	<!-- Cards Section -->
	<div id="cardsContainer"></div>
</div>

<script>
	let itemsData = [];
	
	// --- UTILITY FUNCTIONS ---
	/**
	 * Sets a value in a nested object using a dot-notation path.
	 * @param {object} obj - The object to modify.
	 * @param {string} path - The path to the property (e.g., 'requirements.0.value').
	 * @param {*} value - The value to set.
	 */
	function setNestedValue(obj, path, value) {
		const keys = path.split('.');
		let current = obj;
		for (let i = 0; i < keys.length - 1; i++) {
			current = current[keys[i]];
		}
		current[keys[keys.length - 1]] = value;
	}
	
	// --- DATA HANDLING AND LOADING ---
	document.addEventListener('DOMContentLoaded', () => {
		const statusMsg = document.getElementById('statusMsg');
		fetch('data/items.json')
			.then(response => response.ok ? response.json() : Promise.reject('Network response was not ok'))
			.then(data => {
				statusMsg.textContent = "Loaded from data/items.json ✓";
				statusMsg.style.color = "#28a745";
				document.getElementById('inputJson').value = JSON.stringify(data, null, 2);
				processJsonData(data);
			})
			.catch(error => {
				console.error('Error loading JSON:', error);
				statusMsg.textContent = "Auto-load failed. Upload or paste.";
				statusMsg.style.color = "#d9534f";
			});
	});
	
	document.getElementById('fileInput').addEventListener('change', e => {
		const file = e.target.files[0];
		if (!file) return;
		const reader = new FileReader();
		reader.onload = event => {
			document.getElementById('inputJson').value = event.target.result;
			loadJsonFromTextarea();
		};
		reader.readAsText(file);
	});
	
	function loadJsonFromTextarea() {
		const inputStr = document.getElementById('inputJson').value;
		if (!inputStr.trim()) return alert("Textbox is empty.");
		try {
			const parsed = JSON.parse(inputStr);
			processJsonData(parsed);
			document.getElementById('statusMsg').textContent = "Loaded from Textbox ✓";
			document.getElementById('statusMsg').style.color = "#28a745";
		} catch (err) {
			alert("Invalid JSON format: " + err.message);
		}
	}
	
	function processJsonData(parsedObj) {
		itemsData = Object.keys(parsedObj).map(key => ({
			key: key,
			data: parsedObj[key]
		}));
		renderCards();
		updateOutput();
	}
	
	// --- RENDERING AND UI ---
	function renderCards() {
		const container = document.getElementById('cardsContainer');
		container.innerHTML = '';
		
		itemsData.forEach((item, index) => {
			const d = item.data;
			const card = document.createElement('div');
			card.className = 'card';
			
			// Find coin requirement to make it editable
			const coinReqIndex = d.requirements?.findIndex(r => r.type === 'coins');
			const coinReq = coinReqIndex > -1 ? d.requirements[coinReqIndex] : null;
			
			// Generate HTML for editable fields
			const expenseHTML = `<div class="card-body-row"><strong>Expense:</strong><input class="card-input" type="number" step="1" data-index="${index}" data-key="expense" value="${d.expense}" oninput="updateItem(event)"></div>`;
			const effectHTML = `<div class="card-body-row"><strong>Effect:</strong><input class="card-input" type="number" step="0.01" data-index="${index}" data-key="effect" value="${d.effect}" oninput="updateItem(event)"></div>`;
			const wmHTML = d.writingMultiplier !== undefined ? `<div class="card-body-row"><strong>Writing Multiplier:</strong><input class="card-input" type="number" step="0.01" data-index="${index}" data-key="writingMultiplier" value="${d.writingMultiplier}" oninput="updateItem(event)"></div>` : '';
			const wqHTML = d.writingQuality !== undefined ? `<div class="card-body-row"><strong>Writing Quality:</strong><input class="card-input" type="number" step="0.01" data-index="${index}" data-key="writingQuality" value="${d.writingQuality}" oninput="updateItem(event)"></div>` : '';
			const coinsHTML = coinReq ? `<div class="card-body-row"><strong>Coins:</strong><input class="card-input" type="number" step="1" data-index="${index}" data-key="requirements.${coinReqIndex}.value" value="${coinReq.value}" oninput="updateItem(event)"></div>` : `<div class="card-body-row"><strong>Coins:</strong><span>None</span></div>`;
			
			card.innerHTML = `
                <div class="card-header">
                    <img class="card-image" src="img/items/${d.filename}" alt="${d.name}" onerror="this.onerror=null;this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iI2VlZSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiIgZm9udC1zaXplPSIxMiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI2FhYSIgZHk9Ii4zZW0iPk5vIEltYWdlPC90ZXh0Pjwvc3ZnPg=='">
                    <div>
                        <h3 class="card-title">${d.name}</h3>
                        <p class="card-category">${d.category}</p>
                    </div>
                </div>
                <div class="card-body">
                    ${expenseHTML}
                    ${effectHTML}
                    ${wmHTML}
                    ${wqHTML}
                    ${coinsHTML}
                    ${d.description ? `<div class="card-body-row"><strong>Description:</strong> <span>${d.description}</span></div>` : ''}
                    <div><strong>Prompt:</strong><div class="prompt-text">${d.imageprompt}</div></div>
                </div>
                <div class="card-actions">
                    <button class="btn-move" onclick="moveUp(${index})" ${index === 0 ? 'disabled' : ''}>⬆ Move Up</button>
                    <button class="btn-move" onclick="moveDown(${index})" ${index === itemsData.length - 1 ? 'disabled' : ''}>⬇ Move Down</button>
                </div>
            `;
			container.appendChild(card);
		});
	}
	
	// --- ACTIONS AND UPDATES ---
	function updateItem(event) {
		const input = event.target;
		const index = parseInt(input.dataset.index, 10);
		const key = input.dataset.key;
		const value = parseFloat(input.value);
		
		if (!isNaN(value)) {
			setNestedValue(itemsData[index].data, key, value);
			updateOutput();
		}
	}
	
	function moveUp(index) {
		if (index > 0) {
			[itemsData[index - 1], itemsData[index]] = [itemsData[index], itemsData[index - 1]];
			renderCards();
			updateOutput();
		}
	}
	
	function moveDown(index) {
		if (index < itemsData.length - 1) {
			[itemsData[index], itemsData[index + 1]] = [itemsData[index + 1], itemsData[index]];
			renderCards();
			updateOutput();
		}
	}
	
	function updateOutput() {
		const outputObj = itemsData.reduce((acc, item) => {
			acc[item.key] = item.data;
			return acc;
		}, {});
		document.getElementById('outputJson').value = JSON.stringify(outputObj, null, 2);
	}
	
	function copyOutput() {
		const outputText = document.getElementById('outputJson');
		if (!outputText.value) return;
		navigator.clipboard.writeText(outputText.value).then(() => {
			const msg = document.getElementById('copyMsg');
			msg.style.display = 'inline';
			setTimeout(() => { msg.style.display = 'none'; }, 2000);
		});
	}
</script>

</body>
</html>
